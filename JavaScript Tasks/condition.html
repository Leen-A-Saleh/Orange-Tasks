<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>condition Program</title>
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="d-flex justify-content-center align-items-center vh-100">
        <div class="container">
            <p class="text-center fs-6 fw-bold">Condition Program</p>
            <div class="calculator m-auto text-center">
            </div>
        </div>
    </header>
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- custom js -->
    <script src="assets/js/index.js"></script>
    <script>
        let x = Number(prompt("Enter X:"));
        let y = Number(prompt("Enter Y:"));
        let res;

        if (x >= y) {
            res = `Hello World`;
            console.log(res);
            alert("Hello World");
        } else {
            res = `Goodbye`;
            console.error(res);
            alert("Goodbye");
        }
        document.querySelector("div.calculator").innerHTML += res;

    </script>
</body>

</html>
