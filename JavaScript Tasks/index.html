<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Program</title>
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="d-flex justify-content-center align-items-center vh-100">
        <div class="container">
            <p class="text-center fs-6 fw-bold">Calculation Program</p>
            <div class="calculator m-auto text-center">
                <input type="text" disabled>
                <div class="spans">
                    <span>C</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>
                    <span>/</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                    <span>*</span>
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>-</span>
                    <span>0</span>
                    <span>.</span>
                    <span>+</span>
                    <span>=</span>
                </div>
            </div>
        </div>
    </header>
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- custom js -->
    <script src="assets/js/index.js"></script>
    <script>
        let num1 = Number(prompt("Enter the first number:"));
        let op = prompt("Enter the operation:");
        let num2 = Number(prompt("Enter the secound number:"));
        let res;

        function calculat(num1, op, num2) {
            if (op == "+") {
                return num1 + num2;
            } else if (op == "-") {
                return num1 - num2;
            } else if (op == "*") {
                return num1 * num2;
            } else if (op == "/") {
                return num1 / num2;
            } else {
                return " ";
            }
        }
        res = calculat(num1, op, num2);
        document.querySelector("input").value = `${num1} ${op} ${num2} = ${res}`;

    </script>
</body>

</html>
