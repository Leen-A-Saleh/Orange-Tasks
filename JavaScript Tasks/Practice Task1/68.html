<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 & 8 Task</title>
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="d-flex justify-content-center align-items-center vh-100">
        <div class="container">
            <p class="text-center fs-6 fw-bold">Literals & Age category</p>
            <div class="calculator m-auto text-center py-2 px-3">
            </div>
        </div>
    </header>
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- custom js -->
    <script src="assets/js/index.js"></script>
    <script>
        let name = prompt("Enter your Name : ");
        let age = prompt("Enter your age : ");
        let city = prompt("Enter your city : ");
        // task8================
        let ageCat;
        if (age < 13) {
            ageCat = "Child;"
            console.log(ageCat);
            alert(ageCat);
        } else if (age >= 13 && age < 19) {
            ageCat = " Teenager";
            console.log(ageCat);
            alert(ageCat);
        } else if (age >= 20 && age < 59) {
            ageCat = "Adult";
            console.log(ageCat);
            alert(ageCat);
        } else {
            ageCat = "Senior";
            console.log(ageCat);
            alert(ageCat);
        }

        // task6=====================
        document.querySelector("div.calculator").innerHTML = `Hello ${name}! <br> you are ${age} (${ageCat}) years old  and you live in ${city}`;
        console.log(`Hello ${name}! you are ${age} (${ageCat}) years old  and you live in ${city}`);
        alert(`Hello ${name}! you are ${age} (${ageCat}) years old  and you live in ${city}`);

    </script>
</body>

</html>
