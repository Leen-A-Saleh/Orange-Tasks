<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
    <!-- bootstarp css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <style>
        .form {
            background-color: #eee;
            box-shadow: inset 0 0 5px 1px #888;
        }

        .form input:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <header class="container d-flex flex-column justify-content-center align-content-center vh-100">
        <form action="#" id="form" class="form p-4 rounded w-50 m-auto">
            <h1 class="text-center mb-4 fs-3 fw-semibold">Basic Info Form</h1>
            <div class="row align-content-center">
                <!--! first Name -->
                <label for="Fname" class="form-label col-md-3">First Name:</label>
                <div class="col-md-9">
                    <input type="text" id="Fname" class="form-control mt-md-3">
                    <small id="Fname-error" class="form-text text-danger"></small>
                </div>

                <!-- !Last Name -->
                <label for="Lname" class="form-label col-md-3 mt-2">Last Name:</label>
                <div class="col-md-9">
                    <input type="text" id="Lname" class="form-control mt-md-3">
                    <small id="Lname-error" class="form-text text-danger"></small>
                </div>

                <!-- !email -->
                <label for="email" class="form-label col-md-3 mt-2">Email:</label>
                <div class="col-md-9">
                    <input type="email" id="email" class="form-control mt-md-3">
                    <small id="email-error" class="form-text text-danger"></small>
                </div>

                <!-- !phone -->
                <label for="phone" class="form-label col-md-3 mt-2">Phone:</label>
                <div class="col-md-9">
                    <input type="text" id="phone" class="form-control mt-md-3">
                    <small id="phone-error" class="form-text text-danger"></small>
                </div>

                <!-- !password -->
                <label for="pass" class="form-label col-md-3 mt-2">Password:</label>
                <div class="col-md-9">
                    <input type="password" id="pass" class="form-control mt-md-3">
                    <small id="pass-error" class="form-text text-danger"></small>
                </div>

                <!-- !confirm password -->
                <label for="confirmPass" class="form-label col-md-3 mt-2">confirm Password:</label>
                <div class="col-md-9">
                    <input type="password" id="confirmPass" class="form-control mt-md-3">
                    <small id="confirmPass-error" class="form-text text-danger"></small>
                </div>

                <!-- !button -->
                <button type="submit" class="btn btn-primary mt-3 w-50 m-auto" id="submit">Submit</button>
            </div>
        </form>
        <hr>
        <div class="form p-4 rounded w-50 m-auto">
            <h2 class="text-center mb-4 fs-3 fw-semibold">Submitted Data</h2>
            <p id="targetFname" class="fw-semibold"></p>
            <p id="targetLname" class="fw-semibold"></p>
            <p id="targetEmail" class="fw-semibold"></p>
            <p id="targetPhone" class="fw-semibold"></p>
            <p id="targetPass" class="fw-semibold"></p>
        </div>
    </header>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- custom js -->
    <script src="assets/js/index.js"></script>
</body>

</html>
