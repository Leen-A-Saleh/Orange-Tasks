<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple logic</title>
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="d-flex justify-content-center align-items-center vh-100">
        <div class="container">
            <p class="text-center fs-6 fw-bold">Simple Logic System</p>
            <div class="calculator m-auto text-center py-2 px-3">
            </div>
        </div>

    <!-- bootstrap js -->

    <!-- custom js -->
    <script src="assets/js/index.js"></script>
    <script>
        const USERNAME = "admin";
        const PASSWORD = "1234";
        let userName = prompt("Enter userName :");
        let pass = prompt("Enter Password : ");

        if (USERNAME == userName && PASSWORD == pass) {
            alert("Logic Successful");
            console.log("Logic Successful");
            document.querySelector("div.calculator").innerHTML = `Logic Successfu`;
        } else {
            alert("Invalid userName or Password");
            console.error("Invalid userName or Password");
            document.querySelector("div.calculator").innerHTML = `Invalid userName or Password`;
        }

    </script>
